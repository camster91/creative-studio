# Traefik dynamic config for photogen.ashbi.ca
# Lives at /data/coolify/proxy/dynamic/photogen.yml on the Coolify server.
# Loaded by Traefik on file change (dynamic configuration provider).
#
# Why this file exists outside the GitHub deploy workflow:
# Coolify's auto-discovery picks up Traefik LABELS on the running container, but
# labels only register on container start. If the container is recreated by a
# deploy script, the IP can change and labels may not match the new container.
# This dynamic file references the container by Docker service name ("photogen")
# which Docker's internal DNS resolves regardless of container IP. Stable.
#
# To re-apply on a fresh Coolify server:
#   ssh root@187.77.26.99
#   nano /data/coolify/proxy/dynamic/photogen.yml
#   (paste the contents of this file)
#   Traefik will hot-reload within ~5 seconds, no restart needed.

http:
  routers:
    photogen-router:
      rule: "Host(`photogen.ashbi.ca`)"
      service: photogen-service
      entryPoints:
        - http
        - https
      tls:
        certResolver: letsencrypt

  services:
    photogen-service:
      loadBalancer:
        servers:
          - url: "http://photogen:5173"
