name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
        continue-on-error: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Python dependencies
        run: pip install -e .
      - name: Lint with ruff
        run: pip install ruff && ruff check scripts/ || true
      - name: Type check with mypy
        run: pip install mypy && mypy scripts/ --ignore-missing-imports --follow-untyped-imports || true
      - name: Run pytest
        run: pytest || true
