name: CI Build

# Build-only workflow: verifies the project builds cleanly. No deploy, no secrets required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build
        env:
          NODE_ENV: production
          CI: true

  python:
    name: Python compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      # creative-studio's pyproject.toml has a local file:// path that pip can't resolve
      # in CI. Skip pip install -e . and just compile-check Python sources.
      - name: Compile-check Python files
        run: |
          for f in $(find . -maxdepth 4 -name "*.py" -not -path "./node_modules/*" -not -path "./.venv/*"); do
            python -m py_compile "$f" || exit 1
          done
