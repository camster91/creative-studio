name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Coolify via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COOLIFY_HOST }}
          username: ${{ secrets.COOLIFY_USER }}
          key: ${{ secrets.COOLIFY_SSH_KEY }}
          script: |
            APP_DIR="/root/repos/creative-studio"
            IMAGE_NAME="creative-studio"
            CONTAINER_NAME="photogen"

            # 1. Clone or pull latest
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone https://github.com/camster91/creative-studio.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # 2. Build image
            docker build -t "$IMAGE_NAME:latest" .

            # 3. Stop old container (if exists)
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            # 4. Run new container
            docker run -d \
              --name "$CONTAINER_NAME" \
              --network coolify \
              --restart unless-stopped \
              -v creative-studio-data:/app/data \
              -v creative-studio-outputs:/app/outputs \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              -e FIGMA_ACCESS_TOKEN=${{ secrets.FIGMA_ACCESS_TOKEN }} \
              -e FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }} \
              -e PORT=5173 \
              -l traefik.enable=true \
              -l "traefik.http.routers.https-0-photogen.rule=Host(\`photogen.ashbi.ca\`)" \
              -l traefik.http.routers.https-0-photogen.tls=true \
              -l traefik.http.routers.https-0-photogen.tls.certresolver=letsencrypt \
              -l traefik.http.routers.https-0-photogen.entrypoints=https \
              -l traefik.http.services.https-0-photogen.loadbalancer.server.port=5173 \
              -l coolify.managed=true \
              "$IMAGE_NAME:latest"

            # 5. Verify
            sleep 5
            docker ps --format '{{.Names}} {{.Status}}' | grep "$CONTAINER_NAME" || (echo "FAIL: container not running" && exit 1)
            docker logs "$CONTAINER_NAME" --tail 10
            curl -sf http://localhost:5173/api/costs > /dev/null && echo "Health: OK" || (echo "Health: FAIL" && exit 1)
