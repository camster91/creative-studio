name: Deploy Creative Studio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to deploy'
        required: true
        type: choice
        options: [staging, prod]
        default: staging
      sha:
        description: 'Git SHA to deploy (default: HEAD)'
        required: false
        type: string
        default: ''

# Prevent concurrent deploys to the same target
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ── Build the image in CI, push to GitHub Container Registry ──
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "full_sha=$FULL_SHA" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/camster91/creative-studio:${{ steps.meta.outputs.sha }}
            ghcr.io/camster91/creative-studio:${{ steps.meta.outputs.full_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag :latest on main only
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/camster91/creative-studio:latest

      - name: Image metadata
        run: |
          echo "### Image built" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: \`${{ steps.meta.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Full SHA: \`${{ steps.meta.outputs.full_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tags: ghcr.io/camster91/creative-studio:\`${{ steps.meta.outputs.sha }}\`, :\`${{ steps.meta.outputs.full_sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Test the freshly built image before deploying anywhere ──
  smoke:
    name: Smoke test the new image
    runs-on: ubuntu-latest
    needs: build
    services:
      # We can't actually hit Gemini from CI without a real key, so we
      # only test the parts of the app that don't require an upstream API:
      # container boots, /api/whoami works, /api/costs works, / serves HTML.
    steps:
      - uses: actions/checkout@v4

      - name: Pull and run the image
        run: |
          # Login to ghcr for the private image
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/camster91/creative-studio:${{ steps.meta.outputs.full_sha }}
          docker run -d --name smoke -p 15173:5173 \
            -e CREATIVE_OUTPUT_DIR=/tmp/out -e CREATIVE_DATA_DIR=/tmp/data \
            -e CREATIVE_DAILY_LIMIT=0 \
            -e PORT=5173 \
            ghcr.io/camster91/creative-studio:${{ steps.meta.outputs.full_sha }}
          # Allow it to come up
          for i in {1..30}; do
            if curl -sf http://localhost:15173/api/whoami > /dev/null; then
              echo "Container up after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Health check
        run: |
          set -e
          STATUS=$(curl -s -o /tmp/whoami.json -w "%{http_code}" http://localhost:15173/api/whoami)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /api/whoami returned $STATUS"
            docker logs smoke
            exit 1
          fi
          cat /tmp/whoami.json
          echo ""
          # Verify the app is up (version-agnostic — drifts every release)
          python3 -c "import json; d=json.load(open('/tmp/whoami.json')); assert 'version' in d, f'no version in whoami: {d}'; print('whoami OK, version=' + d['version'])"
      - name: Costs endpoint
        run: |
          set -e
          curl -sf http://localhost:15173/api/costs | python3 -m json.tool
      - name: Home page renders
        run: |
          set -e
          HTML=$(curl -sf http://localhost:15173/)
          echo "$HTML" | grep -q "Creative Studio" || (echo "FAIL: home page missing brand"; exit 1)
          # No literal \u003e in served HTML (regression guard for the
          # raw-string arrow bug we hit before)
          echo "$HTML" | grep -q "u003e" && (echo "FAIL: served HTML contains literal \\\\u003e (raw-string arrow bug regression)"; exit 1) || echo "No literal \u003e — OK"
          echo "Home page OK"
      - name: Editor renders
        run: |
          set -e
          HTML=$(curl -sf http://localhost:15173/app)
          # Must contain the 3 core editor surfaces
          for marker in "dropzone" "Generate" "SCENE" "In-hand" "Studio" "Lifestyle"; do
            echo "$HTML" | grep -q "$marker" || (echo "FAIL: /app missing '$marker'"; exit 1)
          done
          echo "Editor OK — all 6 core markers present"
      - name: Teardown
        if: always()
        run: |
          docker stop smoke 2>/dev/null || true
          docker rm smoke 2>/dev/null || true
          docker image prune -f || true

  # ── Deploy to staging (always) ──
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build, smoke]
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    environment:
      name: staging
      url: https://stage.photogen.ashbi.ca
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Coolify (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COOLIFY_HOST }}
          username: ${{ secrets.COOLIFY_USER }}
          key: ${{ secrets.COOLIFY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            # Login to GHCR for private image pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image
            docker pull ghcr.io/camster91/creative-studio:${{ github.sha }}

            # Ensure staging env file exists
            if [ ! -f /root/.env.photogen-stage ]; then
              echo "CREATIVE_DAILY_LIMIT=5" > /root/.env.photogen-stage
              chmod 600 /root/.env.photogen-stage
            fi

            # Stop and remove old staging container
            docker stop photogen-stage 2>/dev/null || true
            docker rm photogen-stage 2>/dev/null || true

            # Start new staging container
            docker run -d \
              --name photogen-stage \
              --network coolify \
              --restart unless-stopped \
              -p 5174:5173 \
              -v /root/photogen-stage-data:/app/data \
              -v /root/photogen-stage-outputs:/app/outputs \
              --env-file /root/.env.photogen-stage \
              -e CREATIVE_OUTPUT_DIR=/app/outputs \
              -e CREATIVE_DATA_DIR=/app/data \
              -e PORT=5173 \
              ghcr.io/camster91/creative-studio:${{ github.sha }}

            # Verify
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5174/api/whoami)
            if [ "$STATUS" != "200" ]; then
              echo "Staging health check failed: HTTP $STATUS"
              docker logs photogen-stage --tail 20
              exit 1
            fi
            echo "Staging deployed and healthy"

  # ── Deploy to production (only on main, only after staging is healthy) ──
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build, smoke, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://photogen.ashbi.ca
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Coolify (prod)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COOLIFY_HOST }}
          username: ${{ secrets.COOLIFY_USER }}
          key: ${{ secrets.COOLIFY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image
            docker pull ghcr.io/camster91/creative-studio:${{ github.sha }}

            # Remember the previous good image tag for rollback
            PREVIOUS=$(docker inspect photogen --format "{{.Image}}" 2>/dev/null || echo "")
            echo "Previous image: $PREVIOUS"

            # Stop and remove current prod container
            docker stop photogen 2>/dev/null || true
            docker rm photogen 2>/dev/null || true

            # Start new prod container
            docker run -d \
              --name photogen \
              --network coolify \
              --restart unless-stopped \
              -p 5173:5173 \
              -v /root/photogen-data:/app/data \
              -v /root/photogen-outputs:/app/outputs \
              --env-file /root/.env.photogen \
              -e CREATIVE_OUTPUT_DIR=/app/outputs \
              -e CREATIVE_DATA_DIR=/app/data \
              -e PORT=5173 \
              -l traefik.enable=true \
              -l "traefik.http.routers.https-0-photogen.rule=Host(\`photogen.ashbi.ca\`)" \
              -l traefik.http.routers.https-0-photogen.tls=true \
              -l traefik.http.routers.https-0-photogen.tls.certresolver=letsencrypt \
              -l traefik.http.routers.https-0-photogen.entrypoints=https \
              -l traefik.http.services.https-0-photogen.loadbalancer.server.port=5173 \
              -l coolify.managed=true \
              ghcr.io/camster91/creative-studio:${{ github.sha }}

            # Health check — if it fails, the next step rolls back
            sleep 8
            STATUS=$(curl -s -o /tmp/whoami.json -w "%{http_code}" http://localhost:5173/api/whoami)
            if [ "$STATUS" != "200" ]; then
              echo "Prod health check FAILED: HTTP $STATUS"
              cat /tmp/whoami.json 2>/dev/null
              docker logs photogen --tail 30
              echo "Rolling back to previous image: $PREVIOUS"
              if [ -n "$PREVIOUS" ]; then
                docker stop photogen 2>/dev/null || true
                docker rm photogen 2>/dev/null || true
                docker run -d \
                  --name photogen \
                  --network coolify \
                  --restart unless-stopped \
                  -p 5173:5173 \
                  -v /root/photogen-data:/app/data \
                  -v /root/photogen-outputs:/app/outputs \
                  --env-file /root/.env.photogen \
                  -e CREATIVE_OUTPUT_DIR=/app/outputs \
                  -e CREATIVE_DATA_DIR=/app/data \
                  -e PORT=5173 \
                  -l traefik.enable=true \
                  -l "traefik.http.routers.https-0-photogen.rule=Host(\`photogen.ashbi.ca\`)" \
                  -l traefik.http.routers.https-0-photogen.tls=true \
                  -l traefik.http.routers.https-0-photogen.tls.certresolver=letsencrypt \
                  -l traefik.http.routers.https-0-photogen.entrypoints=https \
                  -l traefik.http.services.https-0-photogen.loadbalancer.server.port=5173 \
                  -l coolify.managed=true \
                  "$PREVIOUS"
                echo "Rollback complete"
              fi
              exit 1
            fi
            echo "Prod deployed and healthy"
            # Also keep the last 3 images for future rollback (don't prune the previous one)
            docker images creative-studio --format "{{.ID}}" | \
              docker images ghcr.io/camster91/creative-studio --format "{{.ID}}" | sort -u | tail -n +4 | \
              xargs -r docker rmi 2>/dev/null || true
            echo "Pruned old images, kept last 3"

  # ── Manual rollback (workflow_dispatch) ──
  rollback:
    name: Rollback prod
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'prod'
    environment:
      name: production
      url: https://photogen.ashbi.ca
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Show available tags for rollback
        run: |
          git tag --sort=-version:refname | head -20
      - name: Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.COOLIFY_HOST }}
          username: ${{ secrets.COOLIFY_USER }}
          key: ${{ secrets.COOLIFY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            TARGET_SHA="${{ inputs.sha }}"
            if [ -z "$TARGET_SHA" ]; then
              TARGET_SHA="v4.5.1-prod"
            fi
            # Validate the input is a sane git ref (hex SHA, tag, or branch name).
            # Prevents shell injection from a malicious workflow_dispatch payload.
            if ! echo "$TARGET_SHA" | grep -qE '^[a-zA-Z0-9._/-]{1,64}$'; then
              echo "Refusing to use TARGET_SHA — does not match safe ref pattern: $TARGET_SHA"
              exit 1
            fi
            echo "Rolling back to: $TARGET_SHA"
            # Resolve the tag to a commit SHA inside the runner's checkout
            COMMIT=$(git rev-parse --short "$TARGET_SHA" 2>/dev/null || echo "$TARGET_SHA")
            docker pull ghcr.io/camster91/creative-studio:$COMMIT || \
              docker pull ghcr.io/camster91/creative-studio:$TARGET_SHA
            docker stop photogen 2>/dev/null || true
            docker rm photogen 2>/dev/null || true
            docker run -d \
              --name photogen \
              --network coolify \
              --restart unless-stopped \
              -p 5173:5173 \
              -v /root/photogen-data:/app/data \
              -v /root/photogen-outputs:/app/outputs \
              --env-file /root/.env.photogen \
              -e CREATIVE_OUTPUT_DIR=/app/outputs \
              -e CREATIVE_DATA_DIR=/app/data \
              -e PORT=5173 \
              -l traefik.enable=true \
              -l "traefik.http.routers.https-0-photogen.rule=Host(\`photogen.ashbi.ca\`)" \
              -l traefik.http.routers.https-0-photogen.tls=true \
              -l traefik.http.routers.https-0-photogen.tls.certresolver=letsencrypt \
              -l traefik.http.routers.https-0-photogen.entrypoints=https \
              -l traefik.http.services.https-0-photogen.loadbalancer.server.port=5173 \
              -l coolify.managed=true \
              ghcr.io/camster91/creative-studio:$COMMIT
            sleep 5
            curl -sf http://localhost:5173/api/whoami
            echo ""
            echo "Rollback complete"
